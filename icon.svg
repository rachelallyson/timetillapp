<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FF8B33" />
            <stop offset="50%" stop-color="#F84D66" />
            <stop offset="100%" stop-color="#8C2D8C" />
        </linearGradient>
    </defs>
    <rect width="1024" height="1024" fill="url(#bg)" />
    <!-- Track -->
    <circle cx="512" cy="512" r="328" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="87" />
    <!-- Foreground arc 270° clockwise from 12 o'clock -->
    <path d="M 512 184
             A 328 328 0 1 1 184 512"
          fill="none"
          stroke="white"
          stroke-width="87"
          stroke-linecap="round" />
    <!-- Event marker dot at end of arc (9 o'clock) -->
    <circle cx="184" cy="512" r="83" fill="white" />
    <!-- Center "now" pip -->
    <circle cx="512" cy="512" r="22" fill="rgba(255,255,255,0.9)" />
</svg>
